<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>朱天</title>
    <style>
      html {
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }
    </style>
  </head>
  <body>
    <!-- Restore the original path after a 404 → / redirect (used for /en routing) -->
    <script>
      (function() {
        var redirect = sessionStorage.getItem('gh-redirect');
        if (redirect) {
          sessionStorage.removeItem('gh-redirect');
          if (redirect !== location.pathname + location.search + location.hash) {
            history.replaceState(null, '', redirect);
          }
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
